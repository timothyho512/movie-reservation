spring.application.name=movie-reservation

# Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId:-no-request-id}] %logger{36} - %msg%n

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/${SPRING_DATASOURCE_DB:movie_reservation_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1oczI1Ng==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Frontend Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:${RABBITMQ_DEFAULT_USER:movie_reservation_user}}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS:movie_reservation_pass}}
app.rabbitmq.enabled=${RABBITMQ_ENABLED:true}

# Seat Hold And Cache Configuration
app.seat-lock.ttl-seconds=${SEAT_LOCK_TTL_SECONDS:900}
app.seat-map-cache.ttl-seconds=${SEAT_MAP_CACHE_TTL_SECONDS:10}

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:3000/checkout/success?checkoutReference={CHECKOUT_REFERENCE}}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/checkout/cancel?checkoutReference={CHECKOUT_REFERENCE}}
stripe.currency=${STRIPE_CURRENCY:gbp}
