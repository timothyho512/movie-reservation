spring.application.name=movie-reservation

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/movie_reservation_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1oczI1Ng==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:3000/checkout/success?checkoutReference={CHECKOUT_REFERENCE}}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/checkout/cancel?checkoutReference={CHECKOUT_REFERENCE}}
stripe.currency=${STRIPE_CURRENCY:gbp}
