# Render provides PORT. Binding to all interfaces makes the container reachable.
server.port=${PORT:8080}
server.address=0.0.0.0

# Keep the database connection pool small for Neon's free tier and Render's
# 512 MB free instance.
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=30000

# Hosted Redis and RabbitMQ providers supply complete TLS connection URLs.
spring.data.redis.url=${REDIS_URL}
spring.rabbitmq.addresses=${RABBITMQ_URL}

# Expose only the endpoints Render needs in production.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
