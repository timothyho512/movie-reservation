services:
  db:
    image: postgres:16
    container_name: movie-reservation-db
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-movie_reservation_user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-movie_reservation_pass}
      POSTGRES_DB: ${SPRING_DATASOURCE_DB:-movie_reservation_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: movie-reservation-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: movie-reservation-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-movie_reservation_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-movie_reservation_pass}
    ports:
      - "5672:5672"
      - "15672:15672"

  test-db:
    image: postgres:16
    container_name: movie-reservation-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: movie_reservation_test
    ports:
      - "5434:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
volumes:
  postgres-data:
  postgres-test-data:
